<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Cecilia Bakery</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="auth-theme.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="auth-i18n.js"></script>
</head>
<body>
    <div class="bg-blob"></div>

    <div class="top-controls">
        <a href="login.html" class="back-nav">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            <span id="back-text" data-en="Back to Login" data-es="Regresar al Inicio de Sesión">Back to Login</span>
        </a>
        <div class="nav-controls">
            <div style="display: flex; align-items: center; gap: 0;">
                <button class="lang-btn active" id="btn-en" onclick="setAuthLang('en')">EN</button>
                <button class="lang-btn" id="btn-es" onclick="setAuthLang('es')">ES</button>
            </div>
            <span class="ctrl-divider" style="margin-left:2px">·</span>
            <button class="theme-btn" id="theme-toggle" onclick="toggleAuthTheme()">
                <span id="theme-icon"><i data-lucide='moon' class='icon'></i></span>
            </button>
        </div>
    </div>

    <div class="auth-wrapper" style="max-width: 440px;">
        <div class="auth-card" id="authCard">
            <div class="auth-header">
                <span class="auth-label" data-en="Password Recovery" data-es="Recuperar Contraseña">Password Recovery</span>
                <h1 class="auth-title" data-en="Forgot <em>Password?</em>" data-es="¿Olvidaste tu <em>Contraseña?</em>">Forgot <em>Password?</em></h1>
                <p class="auth-subtitle" data-en="Enter your email and we'll send you a reset link" data-es="Ingresa tu correo y te enviaremos un enlace de restablecimiento">Enter your email and we'll send you a reset link</p>
            </div>

            <form id="resetPasswordForm">
                <div class="input-group">
                    <label class="input-label" data-en="Email Address" data-es="Correo Electrónico">Email Address</label>
                    <input type="email" class="input-field" id="resetEmail" data-en="you@example.com" data-es="tu@ejemplo.com" placeholder="you@example.com" required />
                </div>

                <button type="submit" class="btn-submit" data-en="Send Reset Link" data-es="Enviar Enlace">Send Reset Link</button>
            </form>

            <div class="auth-switch" style="margin-top: 24px;">
                <span data-en="Remember your password?" data-es="¿Recuerdas tu contraseña?">Remember your password?</span>
                <a href="login.html" data-en="Log in" data-es="Inicia sesión">Log in</a>
            </div>
        </div>
    </div>
    <script type="module" src="reset-password.js"></script>
    <script type="module" src="./analytics.js"></script>
    <script type="module" src="./speed-insights.js"></script>
</body>
</html>
