<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Password | Cecilia Bakery</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="auth-theme.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="auth-i18n.js"></script>
</head>
<body>
    <div class="bg-blob"></div>

    <div class="top-controls">
        <a href="login.html" class="back-nav">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            <span id="back-text" data-en="Back to Login" data-es="Regresar al Inicio de Sesión">Back to Login</span>
        </a>
        <div class="nav-controls">
            <div style="display: flex; align-items: center; gap: 0;">
                <button class="lang-btn active" id="btn-en" onclick="setAuthLang('en')">EN</button>
                <button class="lang-btn" id="btn-es" onclick="setAuthLang('es')">ES</button>
            </div>
            <span class="ctrl-divider" style="margin-left:2px">·</span>
            <button class="theme-btn" id="theme-toggle" onclick="toggleAuthTheme()">
                <span id="theme-icon"><i data-lucide='moon' class='icon'></i></span>
            </button>
        </div>
    </div>

    <div class="auth-wrapper" style="max-width: 440px;">
        <div class="auth-card" id="authCard">
            <div class="auth-header">
                <span class="auth-label" data-en="Security" data-es="Seguridad">Security</span>
                <h1 class="auth-title" data-en="New <em>Password</em>" data-es="Nueva <em>Contraseña</em>">New <em>Password</em></h1>
                <p class="auth-subtitle" data-en="Choose a strong new password for your account" data-es="Elige una nueva contraseña segura para tu cuenta">Choose a strong new password for your account</p>
            </div>

            <form id="updatePasswordForm">
                <div class="input-group">
                    <label class="input-label" data-en="New Password" data-es="Nueva Contraseña">New Password</label>
                    <input type="password" class="input-field has-toggle" id="newPassword" data-en="••••••••" data-es="••••••••" placeholder="••••••••" required minlength="6" />
                    <button type="button" class="password-toggle" title="Toggle password visibility">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>

                <div class="input-group">
                    <label class="input-label" data-en="Confirm Password" data-es="Confirmar Contraseña">Confirm Password</label>
                    <input type="password" class="input-field" id="confirmPassword" data-en="••••••••" data-es="••••••••" placeholder="••••••••" required minlength="6" />
                </div>

                <button type="submit" class="btn-submit" data-en="Update Password" data-es="Actualizar Contraseña">Update Password</button>
            </form>
        </div>
    </div>
    <script type="module" src="update-password.js"></script>
    <script type="module" src="./analytics.js"></script>
    <script type="module" src="./speed-insights.js"></script>
</body>
</html>
