<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Login | Cecilia Bakery</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="auth-theme.css">
    <script src="auth-i18n.js"></script>
</head>
<body>
    <div class="bg-blob"></div>

    <div class="top-controls">
        <a href="index.html" class="back-nav">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            <span id="back-text" data-en="Return to Bakery" data-es="Regresar a la Panadería">Return to Bakery</span>
        </a>
        <div class="nav-controls">
            <button class="lang-btn active" id="btn-en" onclick="setAuthLang('en')">EN</button>
            <span class="ctrl-divider">/</span>
            <button class="lang-btn" id="btn-es" onclick="setAuthLang('es')">ES</button>
            <span class="ctrl-divider" style="margin-left:2px">·</span>
            <button class="theme-btn" id="theme-toggle" onclick="toggleAuthTheme()">
                <span id="theme-icon">🌙</span><span id="theme-label">Dark</span>
            </button>
        </div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card" id="authCard">
            <div class="auth-header">
                <span class="auth-label" data-en="Customer Portal" data-es="Portal de Clientes">Customer Portal</span>
                <h1 class="auth-title hide-on-signup" data-en="Welcome <em>Back</em>" data-es="Bienvenido">Welcome <em>Back</em></h1>
                <h1 class="auth-title show-on-signup" data-en="Join <em>Us</em>" data-es="Únete a Nosotros">Join <em>Us</em></h1>
                <p class="auth-subtitle hide-on-signup" data-en="Sign in to view your past orders" data-es="Ingresa para ver tus pedidos anteriores">Sign in to view your past orders</p>
                <p class="auth-subtitle show-on-signup" data-en="Create an account for faster checkout" data-es="Crea una cuenta para compras más rápidas">Create an account for faster checkout</p>
            </div>

            <form id="customerAuthForm">
                <div class="input-group show-on-signup">
                    <label class="input-label" data-en="Full Name" data-es="Nombre Completo">Full Name</label>
                    <input type="text" class="input-field" data-en="E.g. Maria Gonzalez" data-es="Ej. Maria Gonzalez" placeholder="E.g. Maria Gonzalez" />
                </div>
                <div class="input-group">
                    <label class="input-label" data-en="Email Address" data-es="Correo Electrónico">Email Address</label>
                    <input type="email" class="input-field" data-en="you@example.com" data-es="tu@ejemplo.com" placeholder="you@example.com" required />
                </div>
                <div class="input-group show-on-signup">
                    <label class="input-label" data-en="Phone Number <span class='input-optional'>(Optional)</span>" data-es="Teléfono <span class='input-optional'>(Opcional)</span>">Phone Number <span class="input-optional">(Optional)</span></label>
                    <input type="tel" class="input-field" data-en="(555) 123-4567" data-es="(555) 123-4567" placeholder="(555) 123-4567" />
                </div>
                <div class="input-group">
                    <label class="input-label" data-en="Password" data-es="Contraseña">Password</label>
                    <input type="password" class="input-field" data-en="••••••••" data-es="••••••••" placeholder="••••••••" required />
                </div>

                <button type="submit" class="btn-submit hide-on-signup" data-en="Log In" data-es="Iniciar Sesión">Log In</button>
                <button type="submit" class="btn-submit show-on-signup" data-en="Create Account" data-es="Crear Cuenta">Create Account</button>
            </form>

            <div class="auth-switch hide-on-signup">
                <span data-en="Don't have an account?" data-es="¿No tienes cuenta?">Don't have an account?</span> 
                <a href="#" id="toggleSignup" data-en="Sign up" data-es="Regístrate">Sign up</a>
            </div>
            <div class="auth-switch show-on-signup">
                <span data-en="Already have an account?" data-es="¿Ya tienes cuenta?">Already have an account?</span> 
                <a href="#" id="toggleLogin" data-en="Log in" data-es="Inicia sesión">Log in</a>
            </div>
        </div>
    </div>
    <script type="module" src="customer-auth.js"></script>
  <script type="module" src="./analytics.js"></script>
  <script type="module" src="./speed-insights.js"></script>
</body>
</html>
