<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed — Cecilia Bakery</title>
    <meta name="description" content="Your order has been placed! View your order details and track your pickup.">
    <link rel="icon" href="images/Logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e14;
            --card-bg: #16161e;
            --border-subtle: #2a2a3a;
            --tx: #f0ece6;
            --tx-muted: #888;
            --brand-gold: #d4a853;
            --brand-red: #C8102E;
            --green: #4CAF50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--tx);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
        }

        /* ── Animated Background ── */
        .bg-glow {
            position: fixed;
            width: 400px; height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
        }
        .bg-glow-1 { top: -100px; left: -100px; background: var(--brand-gold); }
        .bg-glow-2 { bottom: -100px; right: -100px; background: var(--brand-red); }

        /* ── Main Card ── */
        .confirmation-card {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            padding: 48px 36px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            animation: fadeUp 0.6s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .check-circle {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: rgba(76, 175, 80, 0.12);
            border: 2px solid var(--green);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: scalePop 0.5s ease-out 0.3s both;
        }

        @keyframes scalePop {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .check-circle svg {
            width: 40px; height: 40px;
            stroke: var(--green);
            stroke-width: 2.5;
            fill: none;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--tx-muted);
            margin-bottom: 28px;
        }

        /* ── Order Details ── */
        .order-id {
            display: inline-block;
            background: rgba(212, 168, 83, 0.12);
            color: var(--brand-gold);
            border: 1px solid rgba(212, 168, 83, 0.25);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 24px;
        }

        .info-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 28px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .info-label {
            font-size: 0.85rem;
            color: var(--tx-muted);
        }

        .info-value {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .pay-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(76, 175, 80, 0.1);
            color: var(--green);
            border: 1px solid rgba(76, 175, 80, 0.2);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* ── Items List ── */
        .items-list {
            text-align: left;
            margin-bottom: 28px;
        }

        .items-title {
            font-size: 0.8rem;
            color: var(--tx-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
            margin-bottom: 6px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .item-name {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .item-meta {
            font-size: 0.8rem;
            color: var(--tx-muted);
        }

        .item-price {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--brand-gold);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 16px;
            border-top: 1px solid var(--border-subtle);
            margin-top: 4px;
            font-weight: 600;
        }

        /* ── Buttons ── */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-primary {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--brand-gold);
            color: #1a1a2e;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 168, 83, 0.3);
        }

        .btn-secondary {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
            background: transparent;
            color: var(--tx);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 40px;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border-subtle);
            border-top-color: var(--brand-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .confirmation-card { padding: 32px 20px; }
            h1 { font-size: 1.35rem; }
        }
    </style>
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="confirmation-card" id="confirmation-card">
        <div class="loading-state" id="loading-state">
            <div class="spinner"></div>
            <p style="color: var(--tx-muted);">Loading your order...</p>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-client.js';

        const fullOrderId = sessionStorage.getItem('cecilia_last_order_id');
        const card = document.getElementById('confirmation-card');

        async function loadOrder() {
            if (!fullOrderId) {
                card.innerHTML = renderFallback();
                return;
            }

            try {
                const { data: order, error } = await supabase
                    .from('orders')
                    .select('*')
                    .eq('id', fullOrderId)
                    .single();

                if (error || !order) {
                    card.innerHTML = renderFallback();
                    return;
                }

                card.innerHTML = renderConfirmation(order);
                sessionStorage.removeItem('cecilia_last_order_id');
            } catch (err) {
                console.error('Failed to load order:', err);
                card.innerHTML = renderFallback();
            }
        }

        function renderConfirmation(order) {
            const shortId = order.id.split('-')[0].toUpperCase();
            const orderDate = new Date(order.created_at).toLocaleDateString('en-US', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
            const items = Array.isArray(order.items) ? order.items : [];
            const total = items.reduce((s, item) => s + ((parseFloat(item.price) || 0) * (item.qty || item.quantity || 1)), 0);
            const paymentMethod = order.payment_method === 'at_pickup' ? 'Pay at Pickup' : order.payment_method || 'Pay at Pickup';

            const itemsHtml = items.map(item => {
                const qty = item.qty || 1;
                const price = parseFloat(item.price || 0);
                const lineTotal = qty * price;
                const sizeBit = item.size ? ` · ${item.size}` : '';
                return `
                    <div class="item-row">
                        <div>
                            <div class="item-name">${item.name}${sizeBit}</div>
                            <div class="item-meta">×${qty}</div>
                        </div>
                        <div class="item-price">$${lineTotal.toFixed(2)}</div>
                    </div>`;
            }).join('');

            return `
                <div class="check-circle">
                    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <h1>Order Confirmed! 🎉</h1>
                <p class="subtitle">Your order has been received and is being reviewed.</p>
                <div class="order-id">#${shortId}</div>

                <div class="info-grid">
                    <div class="info-row">
                        <span class="info-label">Status</span>
                        <span class="info-value">📋 Pending</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Payment</span>
                        <span class="pay-badge">💵 ${paymentMethod}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Placed</span>
                        <span class="info-value">${orderDate}</span>
                    </div>
                </div>

                <div class="items-list">
                    <div class="items-title">Order Items</div>
                    ${itemsHtml}
                    <div class="total-row">
                        <span>Total</span>
                        <span style="color: var(--brand-gold);">$${total.toFixed(2)}</span>
                    </div>
                </div>

                <div class="btn-group">
                    <a href="customer-dashboard.html" class="btn-primary">Track My Order</a>
                    <a href="menu.html" class="btn-secondary">Continue Shopping</a>
                </div>`;
        }

        function renderFallback() {
            return `
                <div class="check-circle">
                    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <h1>Order Sent! 🎉</h1>
                <p class="subtitle">Your order has been sent via WhatsApp. We'll confirm it shortly!</p>
                <div class="btn-group" style="margin-top: 28px;">
                    <a href="menu.html" class="btn-primary">Back to Menu</a>
                    <a href="index.html" class="btn-secondary">Go Home</a>
                </div>`;
        }

        loadOrder();
    </script>
</body>
</html>
