<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Order Confirmed — Cecilia Bakery</title>
  <meta name="description" content="Your order has been received at Cecilia Bakery.">
  <link rel="manifest" href="/manifest-website.json">
  <meta name="theme-color" content="#FAFAF8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0E0507" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cecilia">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Design Tokens (matching index.html) ── */
    :root {
      --red: #C8102E; --red-dk: #9B0B22;
      --bg: #FAFAF8; --bg-card: #FFFFFF;
      --tx: #18080D; --tx-muted: #6B5057; --tx-faint: #A08088;
      --bd: rgba(200,16,46,.22);
      --shadow-card: 0 6px 28px rgba(200,16,46,.10);
      --green: #1B7A4A;
    }
    [data-theme="dark"] {
      --bg: #0E0507; --bg-card: #1E0D12;
      --tx: #F2E8E4; --tx-muted: #BFA0A8; --tx-faint: #7A5560;
      --bd: rgba(200,16,46,.35);
      --shadow-card: 0 6px 28px rgba(0,0,0,.40);
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--tx);
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: calc(24px + env(safe-area-inset-top));
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      transition: background .3s ease, color .3s ease;
    }
    h1, h2 { font-family: 'Cormorant Garamond', serif; font-weight: 600; }

    /* ── Animated Blob (subtle brand touch) ── */
    .bg-blob {
      position: fixed; inset: -40%; z-index: -1;
      width: 180%; height: 180%;
      animation: blobDrift 14s ease-in-out infinite alternate;
      pointer-events: none;
    }
    [data-theme="light"] .bg-blob {
      background:
        radial-gradient(ellipse 55% 35% at 20% 30%, rgba(200,16,46,.06) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 78% 68%, rgba(200,16,46,.04) 0%, transparent 50%);
    }
    [data-theme="dark"] .bg-blob {
      background:
        radial-gradient(ellipse 55% 35% at 20% 30%, rgba(200,16,46,.10) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 78% 68%, rgba(200,16,46,.06) 0%, transparent 50%);
    }
    @keyframes blobDrift { from { transform: translate(0,0) scale(1); } to { transform: translate(3%,2%) scale(1.04); } }

    /* ── Card ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--bd);
      border-radius: 16px;
      padding: 48px 36px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-card);
      animation: fadeUp .5s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ── */
    .logo {
      height: 60px;
      width: auto;
      margin: 0 auto 20px;
      display: block;
      object-fit: contain;
    }
    [data-theme="dark"] .logo {
      filter: brightness(0) invert(1) sepia(1) saturate(2) hue-rotate(310deg);
    }

    /* ── Checkmark Circle ── */
    .check-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(27, 122, 74, .1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      animation: scaleIn .4s ease .15s both;
    }
    @keyframes scaleIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .check-circle svg {
      width: 36px; height: 36px;
      stroke: var(--green); fill: none;
      stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Text ── */
    h1 {
      font-size: 1.6rem;
      margin-bottom: 8px;
      color: var(--tx);
    }
    .subtitle {
      font-size: .95rem;
      color: var(--tx-muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    /* ── Order ID Badge ── */
    .order-id {
      display: inline-block;
      background: rgba(200, 16, 46, .06);
      border: 1px solid var(--bd);
      border-radius: 8px;
      padding: 8px 20px;
      font-family: monospace;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--red);
      margin-bottom: 28px;
    }
    [data-theme="dark"] .order-id {
      background: rgba(200, 16, 46, .12);
    }

    /* ── WhatsApp note ── */
    .wa-note {
      font-size: .82rem;
      color: var(--tx-faint);
      line-height: 1.5;
      margin-bottom: 24px;
      padding: 10px 14px;
      border: 1px dashed var(--bd);
      border-radius: 8px;
    }

    /* ── Button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--red);
      color: #fff;
      border: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: .03em;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s, transform .15s;
    }
    .btn:hover { background: var(--red-dk); }
    .btn:active { transform: scale(.97); }
    .btn svg {
      width: 18px; height: 18px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Brand footer ── */
    .brand {
      margin-top: 28px;
      font-size: .72rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--tx-faint);
      opacity: .5;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

<div class="bg-blob"></div>

<div class="card">
  <img src="/assets/logo.png" alt="Cecilia Bakery" class="logo">

  <div class="check-circle">
    <svg viewBox="0 0 24 24">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
  </div>

  <h1 id="title">Order Received!</h1>
  <p class="subtitle" id="subtitle">Your order has been sent to Cecilia Bakery. We'll get started on it right away.</p>

  <div class="order-id" id="order-id" style="display:none"></div>

  <p class="wa-note" id="wa-note">A WhatsApp message with your order details has been opened. Make sure to send it to complete your order.</p>

  <a href="/menu.html" class="btn" id="back-btn">
    <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    <span id="back-text">Back to Menu</span>
  </a>

  <div class="brand">Cecilia Bakery</div>
</div>

<script>
  (function() {
    // ── Read order ID from URL ──
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('id');
    if (orderId) {
      const el = document.getElementById('order-id');
      el.textContent = '#' + orderId.toUpperCase();
      el.style.display = 'inline-block';
    }

    // ── Detect language ──
    const lang = (navigator.language || 'en').toLowerCase();
    if (lang.startsWith('es')) {
      document.getElementById('title').textContent = '¡Pedido Recibido!';
      document.getElementById('subtitle').textContent = 'Tu pedido ha sido enviado a Cecilia Bakery. Comenzaremos a prepararlo de inmediato.';
      document.getElementById('wa-note').textContent = 'Se ha abierto un mensaje de WhatsApp con los detalles de tu pedido. Asegúrate de enviarlo para completar tu pedido.';
      document.getElementById('back-text').textContent = 'Volver al Menú';
    }

    // ── Match system theme ──
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
  })();
</script>

</body>
</html>
