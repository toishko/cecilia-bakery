<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" id="woo-viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Cecilia Bakery - Quick Sale</title>
<style>
/* ═══════════════════════════════════
   WOO.HTML — Woosim-safe sales page
   ZERO position:fixed, ZERO animations
   ZERO service workers, ZERO modals
   ═══════════════════════════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  background: #f9f9f9;
  color: #222;
  -webkit-text-size-adjust: 100%;
  overflow-x: hidden;
}

/* Header */
.woo-header {
  background: #C8102E;
  color: #fff;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: .5px;
}
.woo-header-center {
  text-align: center;
}
.woo-header small {
  display: block;
  font-size: .75rem;
  font-weight: 400;
  opacity: .85;
  margin-top: 2px;
}
.woo-print-btn {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,.15);
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 8px;
  color: #fff;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.woo-print-btn:active { opacity: .7; }

/* Error / Loading */
.woo-msg {
  text-align: center;
  padding: 40px 16px;
  color: #666;
  font-size: .95rem;
}
.woo-msg.error { color: #C8102E; }

/* Client selector */
.woo-field {
  padding: 12px 16px;
  background: #fff;
  border-bottom: 1px solid #eee;
}
.woo-field label {
  display: block;
  font-size: .75rem;
  font-weight: 600;
  color: #888;
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 4px;
}
.woo-field select {
  width: 100%;
  padding: 10px 12px;
  font-size: .95rem;
  border: 1px solid #ddd;
  border-radius: 8px;
  background: #f9f9f9;
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
}

/* Accordion */
.woo-section {
  background: #fff;
  border-bottom: 1px solid #eee;
}
.woo-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  font-weight: 600;
  font-size: .95rem;
  cursor: pointer;
  border-left: 3px solid #C8102E;
  -webkit-tap-highlight-color: transparent;
}
.woo-section-header .arrow {
  font-size: .7rem;
  color: #aaa;
  transition: transform .15s;
}
.woo-section.open .arrow { transform: rotate(180deg); }
.woo-section-body { display: none; }
.woo-section.open .woo-section-body { display: block; }

/* Column header row */
.woo-col-header {
  display: flex;
  padding: 6px 16px;
  background: #f5f5f5;
  border-top: 1px solid #eee;
  font-size: .7rem;
  font-weight: 600;
  color: #888;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.woo-col-header .col-name { flex: 1; }
.woo-col-header .col-qty,
.woo-col-header .col-nt { width: 52px; text-align: center; margin-left: 6px; }

/* Product row */
.woo-row {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  border-top: 1px solid #f0f0f0;
  min-height: 48px;
}
.woo-row.has-qty { background: #fef2f2; }
.woo-row-info { flex: 1; min-width: 0; padding-right: 8px; }
.woo-row-name {
  font-size: .88rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.woo-row-price { font-size: .7rem; color: #888; }

/* Qty inputs — two columns */
.woo-qty-input {
  width: 52px;
  height: 36px;
  border: 1px solid #ddd;
  border-radius: 6px;
  text-align: center;
  font-size: 1rem;
  font-weight: 600;
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
  flex-shrink: 0;
  background: #fff;
  margin-left: 6px;
}
.woo-qty-input.has-val {
  border-color: #C8102E;
  background: #fff5f5;
}
.woo-qty-input.nt-input.has-val {
  border-color: #2563eb;
  background: #eff6ff;
}
.woo-row-line {
  font-size: .8rem;
  font-weight: 600;
  color: #C8102E;
  min-width: 48px;
  text-align: right;
  margin-left: 6px;
}

/* Footer / totals */
.woo-footer {
  background: #fff;
  padding: 16px;
  border-top: 2px solid #C8102E;
  margin-top: 8px;
}
.woo-total-row {
  display: flex;
  justify-content: space-between;
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 12px;
}

/* Payment toggles */
.woo-pay-group {
  margin-bottom: 12px;
}
.woo-pay-group label {
  display: block;
  font-size: .75rem;
  font-weight: 600;
  color: #888;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.woo-toggles {
  display: flex;
  gap: 6px;
}
.woo-toggle {
  flex: 1;
  padding: 8px;
  border: 1px solid #ddd;
  border-radius: 8px;
  background: #f9f9f9;
  text-align: center;
  font-size: .85rem;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
.woo-toggle.active {
  background: #C8102E;
  color: #fff;
  border-color: #C8102E;
}

/* Notes */
.woo-notes {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: .85rem;
  font-family: inherit;
  resize: vertical;
  min-height: 40px;
  margin-bottom: 12px;
}

/* Submit button */
.woo-submit {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #C8102E;
  color: #fff;
  font-size: 1rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.woo-submit:disabled {
  opacity: .4;
  cursor: not-allowed;
}

/* Receipt rendered via inline HTML tables — no special CSS needed */

/* Toast */
.woo-toast {
  background: #222;
  color: #fff;
  padding: 10px 20px;
  border-radius: 8px;
  text-align: center;
  margin: 8px 16px;
  font-size: .85rem;
}
.woo-toast.error { background: #C8102E; }
.woo-toast.success { background: #16a34a; }

/* Print mode — fill full screen for Woosim capture */
.woo-print-mode {
  background: #fff;
}
.woo-print-mode .woo-header { display: none; }
.woo-print-mode #woo-content {
  width: 100%;
  max-width: none;
  margin: 0;
  padding: 0;
  background: #fff;
}

/* Inventory Bar */
.woo-inv-bar {
  background: #fff;
  border-bottom: 1px solid #eee;
  border-left: 3px solid #16a34a;
}
.woo-inv-header {
  padding: 10px 16px;
  font-weight: 600;
  font-size: .85rem;
  cursor: pointer;
  color: #16a34a;
  -webkit-tap-highlight-color: transparent;
}
.woo-inv-header .arrow { font-size: .7rem; color: #aaa; float: right; }
.woo-inv-bar.open .arrow { display: inline-block; }
.woo-inv-body { display: none; padding: 0 16px 10px; }
.woo-inv-bar.open .woo-inv-body { display: block; }
.woo-inv-row-low td { color: #d97706; }
.woo-inv-row-out td { color: #dc2626; font-weight: 700; }

/* Morning Load Form */
.woo-load-wrap {
  padding: 16px;
  background: #fff;
}
.woo-load-title {
  font-size: 1.1rem;
  font-weight: 700;
  text-align: center;
  margin-bottom: 4px;
  color: #C8102E;
}
.woo-load-sub {
  font-size: .8rem;
  text-align: center;
  color: #888;
  margin-bottom: 12px;
}
.woo-load-cat {
  font-size: .8rem;
  font-weight: 700;
  padding: 8px 0 4px;
  border-bottom: 1px solid #eee;
  color: #555;
}
.woo-load-input {
  width: 56px;
  height: 32px;
  border: 1px solid #ddd;
  border-radius: 6px;
  text-align: center;
  font-size: .95rem;
  font-weight: 600;
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
}
.woo-load-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #16a34a;
  color: #fff;
  font-size: 1rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  margin-top: 16px;
  -webkit-tap-highlight-color: transparent;
}
.woo-load-btn:disabled {
  opacity: .4;
  cursor: not-allowed;
}
</style>
</head>
<body>

<div id="woo-app">
  <div class="woo-header">
    <div class="woo-header-center">
      CECILIA BAKERY
      <small id="woo-driver-name">Loading...</small>
    </div>
    <button class="woo-print-btn" onclick="window.print()" aria-label="Print">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    </button>
  </div>
  <div id="woo-content">
    <div class="woo-msg" id="woo-loading">Loading...</div>
  </div>
</div>

<script>
(async function() {
  'use strict';

  const API = 'https://dykztphptnytbihpavpa.supabase.co/rest/v1';
  const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5a3p0cGhwdG55dGJpaHBhdnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4OTY4NzksImV4cCI6MjA4OTQ3Mjg3OX0.jinnkmJj5tjYmMXPEx0FsbE8qHKU2j6kvv5HyczWr4w';
  const HEADERS = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
  const CACHE_TTL = 10 * 60 * 1000;

  // ── Hardcoded product catalog (matches driver-order.js exactly) ──
  const PRODUCTS = {
    redondo: {
      label: 'Round', type: 'redondo',
      items: [
        { key: 'pina', name: 'Piña', cols: ['inside','top'] },
        { key: 'guava', name: 'Guava', cols: ['inside','top'] },
        { key: 'dulce', name: 'Dulce De Leche', cols: ['inside'] },
      ]
    },
    plain: {
      label: 'Plain',
      items: [
        { key: 'plain', name: 'Plain' },
        { key: 'raisin', name: 'Raisin' },
        { key: 'pudin', name: 'Pudin' },
      ]
    },
    tresleche: {
      label: 'Tres Leche',
      items: [
        { key: 'tl', name: 'Tres Leche' },
        { key: 'tl_hershey', name: 'Tres Leche Hershey' },
        { key: 'cuatro_leche', name: 'Cuatro Leche' },
        { key: 'tl_straw', name: 'Tres Leche Strawberry' },
        { key: 'tl_pina', name: 'Tres Leche Piña' },
      ]
    },
    piezas: {
      label: 'Pieces',
      items: [
        { key: 'pz_rv', name: 'Red Velvet' },
        { key: 'pz_carrot', name: 'Carrot Cake' },
        { key: 'pz_cheese', name: 'Cheesecake' },
        { key: 'pz_pudin', name: 'Pudin' },
        { key: 'pz_pina', name: 'Piña' },
        { key: 'pz_guava', name: 'Guava' },
        { key: 'pz_chocoflan', name: 'Chocoflan' },
        { key: 'pz_flan', name: 'Flan' },
      ]
    },
    frostin: {
      label: 'Frosted Pieces',
      items: [
        { key: 'fr_guava', name: 'Guava' },
        { key: 'fr_pina', name: 'Piña' },
        { key: 'fr_dulce', name: 'Dulce De Leche' },
        { key: 'fr_choco', name: 'Chocolate' },
      ]
    },
    hb_big: {
      label: 'Happy Birthday - BIG',
      items: [
        { key: 'hb_b_pina', name: 'Piña' },
        { key: 'hb_b_guava', name: 'Guava' },
        { key: 'hb_b_dulce', name: 'Dulce De Leche' },
        { key: 'hb_b_choco', name: 'Chocolate' },
        { key: 'hb_b_straw', name: 'Strawberry' },
      ]
    },
    hb_small: {
      label: 'Happy Birthday - SMALL',
      items: [
        { key: 'hb_s_pina', name: 'Piña' },
        { key: 'hb_s_guava', name: 'Guava' },
        { key: 'hb_s_dulce', name: 'Dulce De Leche' },
        { key: 'hb_s_choco', name: 'Chocolate' },
        { key: 'hb_s_straw', name: 'Strawberry' },
      ]
    },
    cuadrao: {
      label: 'Square',
      items: [
        { key: 'cdr_pudin', name: 'Pudin' },
        { key: 'cdr_pound', name: 'Pound' },
        { key: 'cdr_raisin', name: 'Raisin' },
        { key: 'cdr_maiz', name: 'Maiz' },
      ]
    },
    basos: {
      label: 'Cups',
      items: [
        { key: 'bas_tl', name: 'Tres Leche' },
        { key: 'bas_cl', name: 'Cuatro Leche' },
        { key: 'bas_hershey', name: 'Hershey' },
      ]
    },
    familiar: {
      label: 'Family Size',
      items: [
        { key: 'fam_tl', name: 'Tres Leche' },
        { key: 'fam_cl', name: 'Cuatro Leche' },
      ]
    },
  };

  const content = document.getElementById('woo-content');
  const driverNameEl = document.getElementById('woo-driver-name');
  const params = new URLSearchParams(window.location.search);
  const driverCode = params.get('code');

  if (!driverCode) {
    content.innerHTML = '<div class="woo-msg error">Add ?code=YOUR_PIN to the URL</div>';
    driverNameEl.textContent = '';
    return;
  }

  // ── Helpers ──
  async function sbGet(table, query) {
    const res = await fetch(API + '/' + table + '?' + query, { headers: HEADERS });
    if (!res.ok) throw new Error(table + ': ' + res.status);
    return res.json();
  }
  async function sbPost(table, body) {
    const res = await fetch(API + '/' + table, {
      method: 'POST', headers: HEADERS, body: JSON.stringify(body)
    });
    if (!res.ok) { const t = await res.text(); throw new Error(t); }
    return res.json();
  }
  function cacheGet(key) {
    try {
      const raw = localStorage.getItem('woo_' + key);
      if (!raw) return null;
      const { data, ts } = JSON.parse(raw);
      if (Date.now() - ts > CACHE_TTL) return null;
      return data;
    } catch { return null; }
  }
  function cacheSet(key, data) {
    try { localStorage.setItem('woo_' + key, JSON.stringify({ data, ts: Date.now() })); } catch {}
  }
  function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // ── Authenticate driver ──
  let driver;
  try {
    const rows = await sbGet('drivers', 'code=ilike.' + encodeURIComponent(driverCode) + '&select=*&limit=1');
    if (!rows || rows.length === 0) throw new Error('Driver not found');
    if (!rows[0].is_active) throw new Error('Account disabled');
    driver = rows[0];
    driverNameEl.textContent = driver.name;
  } catch (e) {
    content.innerHTML = '<div class="woo-msg error">' + (e.message || 'Login failed') + '</div>';
    driverNameEl.textContent = 'Error';
    return;
  }

  // ── Try cache first ──
  let clients = cacheGet('clients_' + driver.id) || [];
  let priceMap = cacheGet('prices_' + driver.id) || {};
  const hasCache = clients.length > 0;

  // ── State ──
  let qty = {};      // product_qty_key → quantity
  let clientId = null;
  let payMethod = 'cash';
  let payStatus = 'paid';
  let inventory = {};      // product_key → { loaded, sold, remaining }
  let inventoryLoaded = false;
  let inventorySource = '';  // 'order' or 'manual'

  if (hasCache) renderForm();

  // ── Load fresh data in parallel ──
  try {
    const [clientRows, priceRows] = await Promise.all([
      sbGet('driver_route_clients', 'driver_id=eq.' + driver.id + '&is_active=eq.true&order=business_name.asc&select=*'),
      sbGet('driver_prices', 'driver_id=eq.' + driver.id + '&select=product_key,price'),
    ]);
    clients = clientRows || [];
    cacheSet('clients_' + driver.id, clients);
    priceMap = {};
    if (priceRows) priceRows.forEach(p => priceMap[p.product_key] = parseFloat(p.price));
    cacheSet('prices_' + driver.id, priceMap);

    // ── Load inventory for today ──
    await loadTodayInventory();
    // Always show sales form — inventory bar shows if loaded
    renderForm();
  } catch (e) {
    console.error('Data load error:', e);
    if (!hasCache) content.innerHTML = '<div class="woo-msg error">Failed to load. Check connection.</div>';
  }

  // ── Get all qty keys for a product row ──
  function getRowKeys(item, secType) {
    const keys = [];
    if (secType === 'redondo') {
      (item.cols || []).forEach(c => {
        keys.push({ qtyKey: item.key + '_' + c, ntKey: item.key + '_' + c + '_nt', label: item.name + ' - ' + (c === 'inside' ? 'Inside' : 'Top'), priceKey: item.key + '_' + c });
      });
    } else {
      keys.push({ qtyKey: item.key, ntKey: item.key + '_nt', label: item.name, priceKey: item.key });
    }
    return keys;
  }

  // ── Inventory: load today's data ──
  async function loadTodayInventory() {
    try {
      var today = new Date();
      var dateStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

      // ── Step 1: Check for picked_up orders today (auto-load) ──
      var pickedUpOrders = await sbGet('driver_orders',
        'driver_id=eq.' + driver.id + '&status=eq.picked_up&pickup_date=eq.' + dateStr + '&select=id,order_number');

      if (pickedUpOrders && pickedUpOrders.length > 0) {
        // Load items from all picked_up orders
        var orderIds = pickedUpOrders.map(function(o) { return o.id; });
        var orderItems = await sbGet('driver_order_items',
          'order_id=in.(' + orderIds.join(',') + ')&select=product_key,quantity,adjusted_quantity');

        if (orderItems && orderItems.length > 0) {
          // Aggregate items per product_key (keep _nt variants separate)
          var loadMap = {};
          orderItems.forEach(function(item) {
            var effectiveQty = (item.adjusted_quantity !== null && item.adjusted_quantity !== undefined) ? item.adjusted_quantity : item.quantity;
            loadMap[item.product_key] = (loadMap[item.product_key] || 0) + effectiveQty;
          });

          // Get today's sales to calculate sold quantities
          var soldMap = buildSoldMap(await getTodaySaleItems(dateStr));

          inventory = {};
          Object.keys(loadMap).forEach(function(key) {
            var sold = soldMap[key] || 0;
            inventory[key] = { loaded: loadMap[key], sold: sold, remaining: loadMap[key] - sold };
          });

          // Track source for display
          var orderNums = pickedUpOrders.map(function(o) { return '#' + o.order_number; }).filter(function(n) { return n !== '#undefined' && n !== '#null'; });
          inventorySource = 'order:' + (orderNums.length > 0 ? orderNums.join(', ') : 'Order');
          inventoryLoaded = true;
          return;
        }
      }

      // ── Step 2: Fall back to manual driver_inventory ──
      var loadRows = await sbGet('driver_inventory',
        'driver_id=eq.' + driver.id + '&date=eq.' + dateStr + '&select=product_key,morning_load');
      if (!loadRows || loadRows.length === 0) {
        inventoryLoaded = false;
        return;
      }

      var soldMap2 = buildSoldMap(await getTodaySaleItems(dateStr));

      inventory = {};
      loadRows.forEach(function(row) {
        var sold = soldMap2[row.product_key] || 0;
        inventory[row.product_key] = { loaded: row.morning_load, sold: sold, remaining: row.morning_load - sold };
      });
      inventorySource = 'manual';
      inventoryLoaded = true;
    } catch (e) {
      console.error('Inventory load error:', e);
      inventoryLoaded = false;
    }
  }

  // Helper: get today's sale items
  async function getTodaySaleItems(dateStr) {
    var salesRows = await sbGet('driver_sales',
      'driver_id=eq.' + driver.id + '&created_at=gte.' + encodeURIComponent(dateStr + 'T00:00:00') + '&select=id');
    if (!salesRows || salesRows.length === 0) return [];
    var saleIds = salesRows.map(function(s) { return s.id; });
    var itemRows = await sbGet('driver_sale_items',
      'sale_id=in.(' + saleIds.join(',') + ')&select=product_key,quantity');
    return itemRows || [];
  }

  // Helper: build sold map from sale items
  function buildSoldMap(items) {
    var map = {};
    items.forEach(function(it) {
      map[it.product_key] = (map[it.product_key] || 0) + it.quantity;
    });
    return map;
  }



  // ── Refresh inventory display in-place ──
  function refreshInventoryDisplay() {
    var body = document.getElementById('woo-inv-body');
    if (!body) return;
    var html = '<table width="100%" cellpadding="2" cellspacing="0" border="0" style="font-size:.85rem;">';
    Object.entries(PRODUCTS).forEach(function(entry) {
      var sec = entry[1];
      var catHtml = '';
      var catHasItems = false;
      sec.items.forEach(function(item) {
        var rows = getRowKeys(item, sec.type);
        rows.forEach(function(r) {
          var inv = inventory[r.priceKey];
          if (inv && inv.loaded > 0) {
            if (!catHasItems) {
              catHtml += '<tr><td colspan="2" style="font-weight:700;font-size:.75rem;padding:6px 0 2px;color:#888;text-transform:uppercase;">' + esc(sec.label) + '</td></tr>';
              catHasItems = true;
            }
            var rem = Math.max(0, inv.remaining);
            var cls = inv.remaining <= 0 ? ' class="woo-inv-row-out"' : inv.remaining < 3 ? ' class="woo-inv-row-low"' : '';
            catHtml += '<tr' + cls + '>';
            catHtml += '<td style="padding:2px 0;">' + esc(r.label) + '</td>';
            catHtml += '<td align="right" style="padding:2px 0;white-space:nowrap;">' + rem + ' left</td>';
            catHtml += '</tr>';
          }
        });
      });
      if (catHasItems) html += catHtml;
    });
    html += '</table>';
    body.innerHTML = html;
  }

  // ── Render ──
  function renderForm() {
    let html = '';

    // Inventory bar
    if (inventoryLoaded && Object.keys(inventory).length > 0) {
      html += '<div class="woo-inv-bar" id="woo-inv-bar">';
      var sourceLabel = inventorySource.indexOf('order:') === 0
        ? '&#128230; ' + inventorySource.replace('order:', 'From Order ')
        : '&#9998; Manual Entry';
      html += '<div class="woo-inv-header" onclick="this.parentElement.classList.toggle(\'open\')">' + sourceLabel + ' <span class="arrow">&#9660;</span></div>';
      html += '<div class="woo-inv-body" id="woo-inv-body"></div>';
      html += '</div>';
    }

    // Client selector
    html += '<div class="woo-field"><label>CLIENT</label><select id="woo-client">';
    html += '<option value="">Select a client...</option>';
    clients.forEach(c => {
      html += '<option value="' + c.id + '"' + (c.id === clientId ? ' selected' : '') + '>' + esc(c.business_name) + '</option>';
    });
    html += '</select></div>';

    if (clients.length === 0) {
      html += '<div class="woo-msg">No clients. Add clients in the Driver Portal first.</div>';
    }

    // Product sections
    Object.entries(PRODUCTS).forEach(([secKey, sec]) => {
      html += '<div class="woo-section" data-sec="' + secKey + '">';
      html += '<div class="woo-section-header" onclick="this.parentElement.classList.toggle(\'open\')">';
      html += '<span>' + esc(sec.label) + '</span><span class="arrow">▼</span></div>';
      html += '<div class="woo-section-body">';

      // Column headers
      html += '<div class="woo-col-header"><span class="col-name"></span><span class="col-qty">QTY</span><span class="col-nt">NT</span></div>';

      sec.items.forEach(item => {
        const rows = getRowKeys(item, sec.type);
        rows.forEach(r => {
          const price = priceMap[r.priceKey];
          const priceStr = price ? '$' + price.toFixed(2) : '';
          const curQty = qty[r.qtyKey] || 0;
          const curNt = qty[r.ntKey] || 0;
          const hasAny = curQty > 0 || curNt > 0;

          html += '<div class="woo-row' + (hasAny ? ' has-qty' : '') + '" data-qk="' + r.qtyKey + '" data-nk="' + r.ntKey + '" data-pk="' + r.priceKey + '">';
          html += '<div class="woo-row-info"><div class="woo-row-name">' + esc(r.label) + '</div>';
          if (priceStr) html += '<div class="woo-row-price">' + priceStr + '</div>';
          html += '</div>';
          html += '<input type="number" class="woo-qty-input" data-field="' + r.qtyKey + '" value="' + curQty + '" min="0" inputmode="numeric">';
          html += '<input type="number" class="woo-qty-input nt-input" data-field="' + r.ntKey + '" value="' + curNt + '" min="0" inputmode="numeric">';
          html += '</div>';
        });
      });

      html += '</div></div>';
    });

    // Footer
    html += '<div class="woo-footer" id="woo-footer">';
    html += '<div class="woo-total-row"><span>TOTAL</span><span id="woo-total">$0.00</span></div>';
    html += '<div class="woo-pay-group"><label>PAYMENT METHOD</label><div class="woo-toggles">';
    html += '<button type="button" class="woo-toggle' + (payMethod === 'cash' ? ' active' : '') + '" data-group="method" data-val="cash">Cash</button>';
    html += '<button type="button" class="woo-toggle' + (payMethod === 'check' ? ' active' : '') + '" data-group="method" data-val="check">Check</button>';
    html += '</div></div>';
    html += '<div class="woo-pay-group"><label>PAYMENT STATUS</label><div class="woo-toggles">';
    html += '<button type="button" class="woo-toggle' + (payStatus === 'paid' ? ' active' : '') + '" data-group="status" data-val="paid">Paid</button>';
    html += '<button type="button" class="woo-toggle' + (payStatus === 'on_account' ? ' active' : '') + '" data-group="status" data-val="on_account">On Account</button>';
    html += '<button type="button" class="woo-toggle' + (payStatus === 'unpaid' ? ' active' : '') + '" data-group="status" data-val="unpaid">Unpaid</button>';
    html += '</div></div>';
    html += '<textarea class="woo-notes" id="woo-notes" placeholder="Notes (optional)"></textarea>';
    html += '<button type="button" class="woo-submit" id="woo-submit" disabled>Complete & Print</button>';
    html += '</div>';

    content.innerHTML = html;
    bindEvents();
    updateTotal();
    if (inventoryLoaded) refreshInventoryDisplay();
  }

  // ── Update total ──
  function updateTotal() {
    let total = 0;
    let hasItems = false;

    // Walk every row and compute line total from qty + nt
    document.querySelectorAll('.woo-row[data-qk]').forEach(row => {
      const qk = row.dataset.qk;
      const nk = row.dataset.nk;
      const pk = row.dataset.pk;
      const qVal = qty[qk] || 0;
      const nVal = qty[nk] || 0;
      const combined = qVal + nVal;
      if (combined > 0) {
        hasItems = true;
        const price = priceMap[pk] || 0;
        total += combined * price;
      }
    });

    document.getElementById('woo-total').textContent = '$' + total.toFixed(2);
    const btn = document.getElementById('woo-submit');
    if (btn) btn.disabled = !clientId || !hasItems;
  }

  // ── Events ──
  function bindEvents() {
    document.getElementById('woo-client').addEventListener('change', function() {
      clientId = this.value || null;
      updateTotal();
    });

    // Focus: clear 0
    content.addEventListener('focus', function(e) {
      if (e.target.classList && e.target.classList.contains('woo-qty-input')) {
        if (e.target.value === '0') e.target.value = '';
        e.target.select();
      }
    }, true);

    // Blur: restore 0
    content.addEventListener('blur', function(e) {
      if (e.target.classList && e.target.classList.contains('woo-qty-input')) {
        if (e.target.value === '') {
          e.target.value = '0';
          qty[e.target.dataset.field] = 0;
          updateRowStyle(e.target);
          updateTotal();
        }
      }
    }, true);

    // Input: update qty
    content.addEventListener('input', function(e) {
      if (e.target.classList && e.target.classList.contains('woo-qty-input')) {
        const field = e.target.dataset.field;
        const val = Math.max(0, parseInt(e.target.value) || 0);
        qty[field] = val;
        e.target.classList.toggle('has-val', val > 0);
        updateRowStyle(e.target);
        updateTotal();
      }
    });

    // Payment toggles
    content.addEventListener('click', function(e) {
      const toggle = e.target.closest('.woo-toggle');
      if (!toggle) return;
      const group = toggle.dataset.group;
      const val = toggle.dataset.val;
      toggle.parentElement.querySelectorAll('.woo-toggle').forEach(t => t.classList.remove('active'));
      toggle.classList.add('active');
      if (group === 'method') payMethod = val;
      if (group === 'status') payStatus = val;
    });

    // Submit
    document.getElementById('woo-submit').addEventListener('click', completeSale);
  }

  function updateRowStyle(input) {
    const row = input.closest('.woo-row');
    if (!row) return;
    const inputs = row.querySelectorAll('.woo-qty-input');
    let hasAny = false;
    inputs.forEach(inp => {
      const v = parseInt(inp.value) || 0;
      inp.classList.toggle('has-val', v > 0);
      if (v > 0) hasAny = true;
    });
    row.classList.toggle('has-qty', hasAny);
  }

  // ── Complete Sale ──
  async function completeSale() {
    const btn = document.getElementById('woo-submit');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    try {
      const now = new Date();
      const prefix = 'CB-' + now.getFullYear()
        + String(now.getMonth() + 1).padStart(2, '0')
        + String(now.getDate()).padStart(2, '0') + '-';

      const lastReceipts = await sbGet('driver_sales',
        'receipt_number=like.' + encodeURIComponent(prefix + '*')
        + '&order=receipt_number.desc&limit=1&select=receipt_number');

      let seq = 1;
      if (lastReceipts && lastReceipts.length > 0) {
        seq = (parseInt(lastReceipts[0].receipt_number.split('-').pop()) || 0) + 1;
      }
      const receiptNumber = prefix + String(seq).padStart(4, '0');

      // Collect items — combine qty + nt per product row
      const items = [];
      Object.values(PRODUCTS).forEach(sec => {
        sec.items.forEach(item => {
          const rows = getRowKeys(item, sec.type);
          rows.forEach(r => {
            const qVal = qty[r.qtyKey] || 0;
            const nVal = qty[r.ntKey] || 0;
            const combined = qVal + nVal;
            if (combined > 0) {
              const price = priceMap[r.priceKey] || 0;
              items.push({
                product_key: r.priceKey,
                product_label: r.label,
                quantity: combined,
                unit_price: price,
                line_total: combined * price,
              });
            }
          });
        });
      });

      const total = items.reduce((s, i) => s + i.line_total, 0);
      const notes = document.getElementById('woo-notes')?.value.trim() || '';

      const saleResult = await sbPost('driver_sales', {
        receipt_number: receiptNumber, driver_id: driver.id, client_id: clientId,
        total: total, payment_method: payMethod, payment_status: payStatus,
        notes: notes || null,
      });
      const sale = Array.isArray(saleResult) ? saleResult[0] : saleResult;

      const saleItems = items.map(it => ({
        sale_id: sale.id, product_key: it.product_key, product_label: it.product_label,
        quantity: it.quantity, unit_price: it.unit_price, line_total: it.line_total,
      }));
      await sbPost('driver_sale_items', saleItems);

      const client = clients.find(c => c.id === clientId);

      // Update in-memory inventory
      items.forEach(function(it) {
        if (inventory[it.product_key]) {
          inventory[it.product_key].sold += it.quantity;
          inventory[it.product_key].remaining -= it.quantity;
        }
      });

      showReceipt(sale, items, client);

    } catch (e) {
      console.error('Sale error:', e);
      content.innerHTML += '<div class="woo-toast error">Error: ' + (e.message || 'Failed to save') + '</div>';
      btn.disabled = false;
      btn.textContent = 'Complete & Print';
    }
  }

  // ── Receipt — HTML tables for 4-inch Woosim printer (800px) ──
  function showReceipt(sale, items, client) {
    const dt = new Date(sale.created_at || new Date());
    const dateStr = dt.toLocaleDateString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit' });
    const timeStr = dt.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    const methodLabel = sale.payment_method === 'cash' ? 'Cash' : 'Check';
    const statusLabel = sale.payment_status === 'paid' ? 'Paid'
      : sale.payment_status === 'on_account' ? 'On Account' : 'Unpaid';

    // Strip non-ASCII for thermal printer
    function safe(s) {
      return (s || '').replace(/\u00f1/g, 'n').replace(/\u00d1/g, 'N')
              .replace(/[\u2014\u2013]/g, '-')
              .replace(/[\u00a1]/g, '!')
              .replace(/[^\x20-\x7E\n]/g, '');
    }

    const F = 'font-family:Arial,Helvetica,sans-serif;color:#000;';

    let h = '<div style="width:100%;margin:0;padding:8px;box-sizing:border-box;background:#fff;' + F + '">';

    // ── HEADER (centered) ──
    h += '<table width="100%" cellpadding="0" cellspacing="0" border="0">';
    h += '<tr><td align="center" style="font-size:22px;font-weight:bold;padding:8px 0 2px;' + F + '">Cecilia Bakery</td></tr>';
    h += '<tr><td align="center" style="font-size:12px;padding:0 0 1px;' + F + '">6101 Park Ave, West New York, NJ 07093</td></tr>';
    h += '<tr><td align="center" style="font-size:12px;padding:0 0 6px;' + F + '">Tel: 551-256-0142</td></tr>';
    h += '</table>';

    // Divider
    h += '<hr style="border:none;border-top:1px solid #000;margin:4px 0;">';

    // ── INFO SECTION (left-aligned) ──
    h += '<table width="100%" cellpadding="1" cellspacing="0" border="0" style="font-size:14px;' + F + '">';
    h += '<tr><td>Receipt #: ' + safe(sale.receipt_number) + '</td></tr>';
    h += '<tr><td>Date: ' + safe(dateStr) + ' ' + safe(timeStr) + '</td></tr>';
    h += '<tr><td>Driver: ' + safe(driver.name) + '</td></tr>';
    h += '</table>';

    // Divider
    h += '<hr style="border:none;border-top:1px solid #000;margin:4px 0;">';

    // ── CLIENT (left-aligned) ──
    if (client) {
      h += '<table width="100%" cellpadding="1" cellspacing="0" border="0" style="font-size:14px;' + F + '">';
      h += '<tr><td style="font-weight:bold;">' + safe(client.business_name) + '</td></tr>';
      if (client.address) h += '<tr><td>' + safe(client.address) + '</td></tr>';
      if (client.phone) h += '<tr><td>' + safe(client.phone) + '</td></tr>';
      h += '</table>';
      h += '<hr style="border:none;border-top:1px solid #000;margin:4px 0;">';
    }

    // ── ITEMS TABLE — grouped by category ──
    h += '<table width="100%" cellpadding="3" cellspacing="0" border="0" style="font-size:14px;' + F + '">';

    Object.values(PRODUCTS).forEach(sec => {
      let catHasItems = false;
      sec.items.forEach(item => {
        const rows = getRowKeys(item, sec.type);
        rows.forEach(row => {
          const match = items.find(i => i.product_key === row.priceKey);
          if (match) {
            if (!catHasItems) {
              h += '<tr><td colspan="2" style="font-weight:bold;font-size:13px;padding:8px 0 3px;border-bottom:1px solid #000;">' + safe(sec.label) + '</td></tr>';
              catHasItems = true;
            }
            h += '<tr>';
            h += '<td style="padding:3px 0;">' + safe(match.product_label) + ' x' + match.quantity + '</td>';
            h += '<td align="right" style="padding:3px 0;white-space:nowrap;">$' + match.line_total.toFixed(2) + '</td>';
            h += '</tr>';
          }
        });
      });
    });

    h += '</table>';

    // ── TOTAL ──
    h += '<hr style="border:none;border-top:2px solid #000;margin:8px 0 4px;">';
    h += '<table width="100%" cellpadding="3" cellspacing="0" border="0" style="' + F + '">';
    h += '<tr>';
    h += '<td style="font-size:18px;font-weight:bold;">TOTAL</td>';
    h += '<td align="right" style="font-size:18px;font-weight:bold;">$' + Number(sale.total).toFixed(2) + '</td>';
    h += '</tr></table>';
    h += '<hr style="border:none;border-top:2px solid #000;margin:4px 0 8px;">';

    // ── PAYMENT ──
    h += '<table width="100%" cellpadding="1" cellspacing="0" border="0" style="font-size:14px;' + F + '">';
    h += '<tr><td>Method: ' + safe(methodLabel) + '</td></tr>';
    h += '<tr><td>Status: ' + safe(statusLabel) + '</td></tr>';
    if (sale.notes) h += '<tr><td style="padding-top:4px;">Notes: ' + safe(sale.notes) + '</td></tr>';
    h += '</table>';

    // ── FOOTER ──
    h += '<hr style="border:none;border-top:1px solid #000;margin:6px 0;">';
    h += '<table width="100%" cellpadding="0" cellspacing="0" border="0">';
    h += '<tr><td align="center" style="font-size:13px;padding:4px 0;' + F + '">Gracias! / Thank you!</td></tr>';
    h += '</table>';

    h += '</div>'; // close receipt container

    content.innerHTML = h;

    // Fill full screen for Woosim capture
    document.getElementById('woo-app').classList.add('woo-print-mode');
    document.body.style.width = '100%';
    document.body.style.margin = '0';
    document.body.style.padding = '0';
    window.scrollTo(0, 0);
  }

  // ── Init ──
  // (rendering handled by inventory-aware loader above)

})();
</script>
</body>
</html>
