<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Cecilia Bakery — Quick Sale</title>
<style>
/* ═══════════════════════════════════
   WOO.HTML — Woosim-safe sales page
   ZERO position:fixed, ZERO animations
   ZERO service workers, ZERO modals
   ═══════════════════════════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  background: #f9f9f9;
  color: #222;
  -webkit-text-size-adjust: 100%;
  overflow-x: hidden;
}

/* Header */
.woo-header {
  background: #C8102E;
  color: #fff;
  padding: 12px 16px;
  text-align: center;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: .5px;
}
.woo-header small {
  display: block;
  font-size: .75rem;
  font-weight: 400;
  opacity: .85;
  margin-top: 2px;
}

/* Error / Loading */
.woo-msg {
  text-align: center;
  padding: 40px 16px;
  color: #666;
  font-size: .95rem;
}
.woo-msg.error { color: #C8102E; }

/* Client selector */
.woo-field {
  padding: 12px 16px;
  background: #fff;
  border-bottom: 1px solid #eee;
}
.woo-field label {
  display: block;
  font-size: .75rem;
  font-weight: 600;
  color: #888;
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 4px;
}
.woo-field select {
  width: 100%;
  padding: 10px 12px;
  font-size: .95rem;
  border: 1px solid #ddd;
  border-radius: 8px;
  background: #f9f9f9;
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
}

/* Accordion */
.woo-section {
  background: #fff;
  border-bottom: 1px solid #eee;
}
.woo-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  font-weight: 600;
  font-size: .95rem;
  cursor: pointer;
  border-left: 3px solid #C8102E;
  -webkit-tap-highlight-color: transparent;
}
.woo-section-header .arrow {
  font-size: .7rem;
  color: #aaa;
  transition: transform .15s;
}
.woo-section.open .arrow { transform: rotate(180deg); }
.woo-section-body { display: none; }
.woo-section.open .woo-section-body { display: block; }

/* Product row — large touch targets for Woosim */
.woo-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-top: 1px solid #f0f0f0;
  min-height: 56px;
}
.woo-row.has-qty { background: #fef2f2; }
.woo-row-info { flex: 1; min-width: 0; padding-right: 12px; }
.woo-row-name {
  font-size: .95rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.woo-row-price { font-size: .75rem; color: #888; }

/* Qty input — simple box, no buttons */
.woo-qty-input {
  width: 52px;
  height: 40px;
  border: 1px solid #ddd;
  border-radius: 8px;
  text-align: center;
  font-size: 1.1rem;
  font-weight: 600;
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
  flex-shrink: 0;
  background: #fff;
}
.woo-row.has-qty .woo-qty-input {
  border-color: #C8102E;
  background: #fff5f5;
}
.woo-row-line {
  font-size: .85rem;
  font-weight: 600;
  color: #C8102E;
  min-width: 50px;
  text-align: right;
  margin-left: 8px;
}

/* Footer / totals */
.woo-footer {
  background: #fff;
  padding: 16px;
  border-top: 2px solid #C8102E;
  margin-top: 8px;
}
.woo-total-row {
  display: flex;
  justify-content: space-between;
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 12px;
}

/* Payment toggles */
.woo-pay-group {
  margin-bottom: 12px;
}
.woo-pay-group label {
  display: block;
  font-size: .75rem;
  font-weight: 600;
  color: #888;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.woo-toggles {
  display: flex;
  gap: 6px;
}
.woo-toggle {
  flex: 1;
  padding: 8px;
  border: 1px solid #ddd;
  border-radius: 8px;
  background: #f9f9f9;
  text-align: center;
  font-size: .85rem;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
.woo-toggle.active {
  background: #C8102E;
  color: #fff;
  border-color: #C8102E;
}

/* Notes */
.woo-notes {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: .85rem;
  font-family: inherit;
  resize: vertical;
  min-height: 40px;
  margin-bottom: 12px;
}

/* Submit button */
.woo-submit {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #C8102E;
  color: #fff;
  font-size: 1rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.woo-submit:disabled {
  opacity: .4;
  cursor: not-allowed;
}

/* ─── Receipt view ─── */
.woo-receipt {
  background: #fff;
  padding: 16px;
  max-width: 380px;
  margin: 0 auto;
  font-family: monospace, 'Courier New', Courier;
  font-size: 12px;
  line-height: 1.4;
  color: #000;
}
.woo-receipt .center { text-align: center; }
.woo-receipt .bold { font-weight: bold; }
.woo-receipt .divider { border-top: 1px dashed #000; margin: 6px 0; }
.woo-receipt .r-row { display: flex; justify-content: space-between; padding: 2px 0; }
.woo-receipt .r-total { font-size: 15px; font-weight: bold; border-top: 2px solid #000; margin-top: 6px; padding-top: 6px; }
.woo-receipt .r-meta div { padding: 1px 0; }

.woo-new-sale {
  display: block;
  width: calc(100% - 32px);
  max-width: 380px;
  margin: 16px auto;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #222;
  color: #fff;
  font-size: 1rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  text-align: center;
}

/* Toast */
.woo-toast {
  background: #222;
  color: #fff;
  padding: 10px 20px;
  border-radius: 8px;
  text-align: center;
  margin: 8px 16px;
  font-size: .85rem;
}
.woo-toast.error { background: #C8102E; }
.woo-toast.success { background: #16a34a; }
</style>
</head>
<body>

<div id="woo-app">
  <div class="woo-header">
    CECILIA BAKERY
    <small id="woo-driver-name">Loading...</small>
  </div>
  <div id="woo-content">
    <div class="woo-msg" id="woo-loading">Loading...</div>
  </div>
</div>

<script>
(async function() {
  'use strict';

  const API = 'https://dykztphptnytbihpavpa.supabase.co/rest/v1';
  const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5a3p0cGhwdG55dGJpaHBhdnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4OTY4NzksImV4cCI6MjA4OTQ3Mjg3OX0.jinnkmJj5tjYmMXPEx0FsbE8qHKU2j6kvv5HyczWr4w';
  const HEADERS = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
  const CACHE_TTL = 10 * 60 * 1000; // 10 minutes

  const content = document.getElementById('woo-content');
  const driverNameEl = document.getElementById('woo-driver-name');
  const params = new URLSearchParams(window.location.search);
  const driverCode = params.get('code');

  if (!driverCode) {
    content.innerHTML = '<div class="woo-msg error">Add ?code=YOUR_PIN to the URL</div>';
    driverNameEl.textContent = '';
    return;
  }

  // ── Helper: Supabase REST fetch ──
  async function sbGet(table, query) {
    const res = await fetch(API + '/' + table + '?' + query, { headers: HEADERS });
    if (!res.ok) throw new Error(table + ': ' + res.status);
    return res.json();
  }
  async function sbPost(table, body) {
    const res = await fetch(API + '/' + table, {
      method: 'POST', headers: HEADERS, body: JSON.stringify(body)
    });
    if (!res.ok) { const t = await res.text(); throw new Error(t); }
    return res.json();
  }

  // ── Cache helpers ──
  function cacheGet(key) {
    try {
      const raw = localStorage.getItem('woo_' + key);
      if (!raw) return null;
      const { data, ts } = JSON.parse(raw);
      if (Date.now() - ts > CACHE_TTL) return null;
      return data;
    } catch { return null; }
  }
  function cacheSet(key, data) {
    try { localStorage.setItem('woo_' + key, JSON.stringify({ data, ts: Date.now() })); } catch {}
  }

  // ── Authenticate driver ──
  let driver;
  try {
    const rows = await sbGet('drivers', 'code=ilike.' + encodeURIComponent(driverCode) + '&select=*&limit=1');
    if (!rows || rows.length === 0) throw new Error('Driver not found');
    if (!rows[0].is_active) throw new Error('Account disabled');
    driver = rows[0];
    driverNameEl.textContent = driver.name;
  } catch (e) {
    content.innerHTML = '<div class="woo-msg error">' + (e.message || 'Login failed') + '</div>';
    driverNameEl.textContent = 'Error';
    return;
  }

  // ── Try cache first for instant render ──
  let clients = cacheGet('clients_' + driver.id) || [];
  let products = cacheGet('products') || {};
  let priceMap = cacheGet('prices_' + driver.id) || {};
  const hasCache = clients.length > 0 && Object.keys(products).length > 0;

  // ── State ──
  let qty = {};
  let clientId = null;
  let payMethod = 'cash';
  let payStatus = 'paid';

  // Render immediately from cache if available
  if (hasCache) {
    renderForm();
  }

  // ── Load fresh data in parallel ──
  try {
    const [clientRows, prodRows, priceRows] = await Promise.all([
      sbGet('driver_route_clients', 'driver_id=eq.' + driver.id + '&is_active=eq.true&order=business_name.asc&select=*'),
      sbGet('b2b_products', 'order=sort_order.asc&select=*'),
      sbGet('driver_prices', 'driver_id=eq.' + driver.id + '&select=product_key,price'),
    ]);

    // Process clients
    clients = clientRows || [];
    cacheSet('clients_' + driver.id, clients);

    // Process products — use unique ID to avoid duplicate-name collisions
    products = {};
    if (prodRows) {
      let idx = 0;
      prodRows.filter(p => !p.sold_out).forEach(p => {
        const secKey = p.tag_en.toLowerCase().replace(/\s+/g, '_');
        if (!products[secKey]) products[secKey] = { label: p.tag_en, items: [] };
        const uniqueKey = (p.name_en.toLowerCase().replace(/\s+/g, '_')) + '__' + idx;
        products[secKey].items.push({
          key: uniqueKey,
          priceKey: p.name_en.toLowerCase().replace(/\s+/g, '_'),
          name: p.name_en,
        });
        idx++;
      });
    }
    cacheSet('products', products);

    // Process prices
    priceMap = {};
    if (priceRows) priceRows.forEach(p => priceMap[p.product_key] = parseFloat(p.price));
    cacheSet('prices_' + driver.id, priceMap);

    // Re-render with fresh data (only if we already rendered from cache or first load)
    renderForm();
  } catch (e) {
    console.error('Data load error:', e);
    if (!hasCache) {
      content.innerHTML = '<div class="woo-msg error">Failed to load. Check connection.</div>';
    }
  }

  // ── Render ──
  function renderForm() {
    let html = '';

    html += '<div class="woo-field"><label>CLIENT</label><select id="woo-client">';
    html += '<option value="">Select a client...</option>';
    clients.forEach(c => {
      html += '<option value="' + c.id + '"' + (c.id === clientId ? ' selected' : '') + '>' + esc(c.business_name) + '</option>';
    });
    html += '</select></div>';

    if (clients.length === 0) {
      html += '<div class="woo-msg">No clients. Add clients in the Driver Portal (Safari) first.</div>';
    }

    Object.entries(products).forEach(([secKey, sec]) => {
      html += '<div class="woo-section" data-sec="' + secKey + '">';
      html += '<div class="woo-section-header" onclick="this.parentElement.classList.toggle(\'open\')">';
      html += '<span>' + esc(sec.label) + '</span><span class="arrow">▼</span></div>';
      html += '<div class="woo-section-body">';
      sec.items.forEach(item => {
        const pk = item.priceKey || item.key;
        const price = priceMap[pk];
        const priceStr = price ? '$' + price.toFixed(2) : 'No price';
        const curQty = qty[item.key] || 0;
        const lineTotal = curQty > 0 ? '$' + (curQty * (price || 0)).toFixed(2) : '';
        html += '<div class="woo-row' + (curQty > 0 ? ' has-qty' : '') + '" data-key="' + item.key + '">';
        html += '<div class="woo-row-info"><div class="woo-row-name">' + esc(item.name) + '</div>';
        html += '<div class="woo-row-price">' + priceStr + '</div></div>';
        html += '<input type="number" class="woo-qty-input" data-key="' + item.key + '" data-pk="' + pk + '" value="' + curQty + '" min="0" inputmode="numeric">';
        html += '<div class="woo-row-line" data-line="' + item.key + '">' + lineTotal + '</div>';
        html += '</div>';
      });
      html += '</div></div>';
    });

    html += '<div class="woo-footer" id="woo-footer">';
    html += '<div class="woo-total-row"><span>TOTAL</span><span id="woo-total">$0.00</span></div>';
    html += '<div class="woo-pay-group"><label>PAYMENT METHOD</label><div class="woo-toggles">';
    html += '<button type="button" class="woo-toggle' + (payMethod === 'cash' ? ' active' : '') + '" data-group="method" data-val="cash">Cash</button>';
    html += '<button type="button" class="woo-toggle' + (payMethod === 'check' ? ' active' : '') + '" data-group="method" data-val="check">Check</button>';
    html += '</div></div>';
    html += '<div class="woo-pay-group"><label>PAYMENT STATUS</label><div class="woo-toggles">';
    html += '<button type="button" class="woo-toggle' + (payStatus === 'paid' ? ' active' : '') + '" data-group="status" data-val="paid">Paid</button>';
    html += '<button type="button" class="woo-toggle' + (payStatus === 'on_account' ? ' active' : '') + '" data-group="status" data-val="on_account">On Account</button>';
    html += '<button type="button" class="woo-toggle' + (payStatus === 'unpaid' ? ' active' : '') + '" data-group="status" data-val="unpaid">Unpaid</button>';
    html += '</div></div>';
    html += '<textarea class="woo-notes" id="woo-notes" placeholder="Notes (optional)"></textarea>';
    html += '<button type="button" class="woo-submit" id="woo-submit" disabled>Complete & Print</button>';
    html += '</div>';

    content.innerHTML = html;
    bindEvents();
    updateTotal();
  }

  function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function updateTotal() {
    let total = 0;
    let hasItems = false;
    Object.entries(qty).forEach(([key, q]) => {
      if (q > 0) {
        hasItems = true;
        // Find the priceKey for this unique key
        const inp = document.querySelector('input[data-key="' + key + '"]');
        const pk = inp ? (inp.dataset.pk || key) : key;
        total += q * (priceMap[pk] || 0);
        const lineEl = document.querySelector('[data-line="' + key + '"]');
        if (lineEl) lineEl.textContent = '$' + (q * (priceMap[pk] || 0)).toFixed(2);
      }
    });
    document.getElementById('woo-total').textContent = '$' + total.toFixed(2);
    const btn = document.getElementById('woo-submit');
    if (btn) btn.disabled = !clientId || !hasItems;
  }

  function bindEvents() {
    document.getElementById('woo-client').addEventListener('change', function() {
      clientId = this.value || null;
      updateTotal();
    });

    content.addEventListener('focus', function(e) {
      if (e.target.tagName === 'INPUT' && e.target.dataset.key) {
        if (e.target.value === '0') e.target.value = '';
        e.target.select();
      }
    }, true);

    content.addEventListener('blur', function(e) {
      if (e.target.tagName === 'INPUT' && e.target.dataset.key) {
        if (e.target.value === '') {
          e.target.value = '0';
          qty[e.target.dataset.key] = 0;
          updateTotal();
        }
      }
    }, true);

    content.addEventListener('input', function(e) {
      if (e.target.tagName === 'INPUT' && e.target.dataset.key) {
        const key = e.target.dataset.key;
        const val = Math.max(0, parseInt(e.target.value) || 0);
        qty[key] = val;
        const row = e.target.closest('.woo-row');
        if (row) row.classList.toggle('has-qty', val > 0);
        if (val === 0) {
          const lineEl = document.querySelector('[data-line="' + key + '"]');
          if (lineEl) lineEl.textContent = '';
        }
        updateTotal();
      }
    });

    content.addEventListener('click', function(e) {
      const toggle = e.target.closest('.woo-toggle');
      if (!toggle) return;
      const group = toggle.dataset.group;
      const val = toggle.dataset.val;
      toggle.parentElement.querySelectorAll('.woo-toggle').forEach(t => t.classList.remove('active'));
      toggle.classList.add('active');
      if (group === 'method') payMethod = val;
      if (group === 'status') payStatus = val;
    });

    document.getElementById('woo-submit').addEventListener('click', completeSale);
  }

  // ── Complete Sale ──
  async function completeSale() {
    const btn = document.getElementById('woo-submit');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    try {
      const now = new Date();
      const prefix = 'CB-' + now.getFullYear()
        + String(now.getMonth() + 1).padStart(2, '0')
        + String(now.getDate()).padStart(2, '0') + '-';

      // Get last receipt number
      const lastReceipts = await sbGet('driver_sales',
        'receipt_number=like.' + encodeURIComponent(prefix + '*')
        + '&order=receipt_number.desc&limit=1&select=receipt_number');

      let seq = 1;
      if (lastReceipts && lastReceipts.length > 0) {
        seq = (parseInt(lastReceipts[0].receipt_number.split('-').pop()) || 0) + 1;
      }
      const receiptNumber = prefix + String(seq).padStart(4, '0');

      const items = [];
      Object.entries(qty).forEach(([key, q]) => {
        if (q > 0) {
          let label = key;
          let pk = key;
          Object.values(products).forEach(sec => {
            sec.items.forEach(item => {
              if (item.key === key) {
                label = item.name;
                pk = item.priceKey || key;
              }
            });
          });
          items.push({
            product_key: pk, product_label: label, quantity: q,
            unit_price: priceMap[pk] || 0, line_total: q * (priceMap[pk] || 0),
          });
        }
      });

      const total = items.reduce((s, i) => s + i.line_total, 0);
      const notes = document.getElementById('woo-notes')?.value.trim() || '';

      // Save sale
      const saleResult = await sbPost('driver_sales', {
        receipt_number: receiptNumber, driver_id: driver.id, client_id: clientId,
        total: total, payment_method: payMethod, payment_status: payStatus,
        notes: notes || null,
      });
      const sale = Array.isArray(saleResult) ? saleResult[0] : saleResult;

      // Save items
      const saleItems = items.map(it => ({
        sale_id: sale.id, product_key: it.product_key, product_label: it.product_label,
        quantity: it.quantity, unit_price: it.unit_price, line_total: it.line_total,
      }));
      await sbPost('driver_sale_items', saleItems);

      const client = clients.find(c => c.id === clientId);
      showReceipt(sale, items, client);

    } catch (e) {
      console.error('Sale error:', e);
      content.innerHTML += '<div class="woo-toast error">Error: ' + (e.message || 'Failed to save') + '</div>';
      btn.disabled = false;
      btn.textContent = 'Complete & Print';
    }
  }

  // ── Show Receipt ──
  function showReceipt(sale, items, client) {
    const dt = new Date(sale.created_at || new Date());
    const dateStr = dt.toLocaleDateString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit' });
    const timeStr = dt.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    const methodLabel = sale.payment_method === 'cash' ? 'Cash' : 'Check';
    const statusLabel = sale.payment_status === 'paid' ? 'Paid'
      : sale.payment_status === 'on_account' ? 'On Account' : 'Unpaid';

    let itemsHtml = '';
    items.forEach(it => {
      itemsHtml += '<div class="r-row"><span>' + esc(it.product_label) + ' x' + it.quantity + '</span>';
      itemsHtml += '<span>$' + it.line_total.toFixed(2) + '</span></div>';
    });

    content.innerHTML = `
      <div class="woo-receipt" id="woo-receipt-area">
        <div class="center bold" style="font-size:15px">CECILIA BAKERY</div>
        <div class="center" style="font-size:10px">Freshly Baked with Love</div>
        <div class="divider"></div>
        <div class="r-meta">
          <div><strong>Receipt #:</strong> ${esc(sale.receipt_number)}</div>
          <div><strong>Date:</strong> ${dateStr} ${timeStr}</div>
          <div><strong>Driver:</strong> ${esc(driver.name)}</div>
          ${client ? '<div><strong>Client:</strong> ' + esc(client.business_name) + '</div>' : ''}
          ${client?.address ? '<div><strong>Addr:</strong> ' + esc(client.address) + '</div>' : ''}
          ${client?.phone ? '<div><strong>Phone:</strong> ' + esc(client.phone) + '</div>' : ''}
        </div>
        <div class="divider"></div>
        ${itemsHtml}
        <div class="r-row r-total"><span>TOTAL</span><span>$${Number(sale.total).toFixed(2)}</span></div>
        <div class="divider"></div>
        <div class="r-meta">
          <div><strong>Method:</strong> ${methodLabel}</div>
          <div><strong>Status:</strong> ${statusLabel}</div>
        </div>
        ${sale.notes ? '<div class="divider"></div><div>' + esc(sale.notes) + '</div>' : ''}
        <div class="divider"></div>
        <div class="center" style="font-size:11px;margin-top:6px">¡Gracias! / Thank you!</div>
      </div>
